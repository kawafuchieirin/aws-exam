<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS認定バッジジェネレーター</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 32px 24px;
}
h1 {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 8px;
  color: #fff;
}
.subtitle {
  text-align: center;
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 24px;
}
.selector-area {
  max-width: 960px;
  margin: 0 auto 20px;
  background: #161b22;
  border-radius: 8px;
  padding: 20px;
}
.cert-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}
.cert-row:last-child { margin-bottom: 0; }
.cert-row select {
  width: 100%;
  background: #21262d;
  color: #e0e0e0;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 8px 6px;
  font-size: 0.85rem;
  cursor: pointer;
}
.cert-row select:focus {
  outline: none;
  border-color: #ff9900;
}
.btn-generate {
  display: block;
  width: 100%;
  max-width: 960px;
  margin: 0 auto 24px;
  padding: 14px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-generate:hover { opacity: 0.85; }
.result-area {
  max-width: 960px;
  margin: 0 auto;
}
.result-area h2 {
  font-size: 1.1rem;
  margin-bottom: 16px;
  color: #aaa;
  display: none;
}
.badge-container {
  display: none;
  background: #161b22;
  border-radius: 8px;
  padding: 24px 16px;
  overflow: hidden;
  text-align: center;
}
.badge-honeycomb {
  position: relative;
  margin: 0 auto;
}
.badge-item {
  position: absolute;
  width: 140px;
}
.badge-item img {
  width: 100%;
  height: auto;
  display: block;
}
.btn-download {
  display: none;
  margin: 16px auto 0;
  padding: 10px 28px;
  background: #ff9900;
  color: #000;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.btn-download:hover { opacity: 0.85; }
#downloadCanvas { display: none; }
</style>
</head>
<body>

<h1>AWS認定バッジジェネレーター</h1>
<p class="subtitle">取得済み認定を選択して、バッジ一覧画像を生成できます</p>

<div class="selector-area">
  <div class="cert-row" id="row-cert1"></div>
  <div class="cert-row" id="row-status1"></div>
  <div class="cert-row" id="row-cert2"></div>
  <div class="cert-row" id="row-status2"></div>
</div>

<button class="btn-generate" id="btnGenerate">バッジ画像を生成</button>

<div class="result-area">
  <h2 id="resultTitle">生成されたバッジ</h2>
  <div class="badge-container" id="badgeContainer"></div>
  <canvas id="downloadCanvas"></canvas>
  <button class="btn-download" id="btnDownload">ダウンロード</button>
</div>

<script src="badge-data.js"></script>
<script>
var ROW1 = [
  { id: 'SAP', label: 'SAP', level: 'PROFESSIONAL' },
  { id: 'SCS', label: 'SCS', level: 'SPECIALTY' },
  { id: 'DEA', label: 'DEA', level: 'ASSOCIATE' },
  { id: 'DVA', label: 'DVA', level: 'ASSOCIATE' },
  { id: 'CLF', label: 'CLF', level: 'FOUNDATIONAL' },
];
var ROW2 = [
  { id: 'DOP', label: 'DOP', level: 'PROFESSIONAL' },
  { id: 'ANS', label: 'ANS', level: 'SPECIALTY' },
  { id: 'MLA', label: 'MLA', level: 'ASSOCIATE' },
  { id: 'SAA', label: 'SAA', level: 'ASSOCIATE' },
  { id: 'SOA', label: 'SOA', level: 'ASSOCIATE' },
  { id: 'AIF', label: 'AIF', level: 'FOUNDATIONAL' },
];
var ALL_CERTS = ROW1.concat(ROW2);

// レベル優先度（小さいほど左に表示）
var LEVEL_ORDER = { PROFESSIONAL: 0, SPECIALTY: 1, ASSOCIATE: 2, FOUNDATIONAL: 3 };

// Preload images from base64 data
var imageCache = {};
ALL_CERTS.forEach(function(cert) {
  var img = new Image();
  img.src = BADGE_DATA[cert.id];
  imageCache[cert.id] = img;
});

// UI構築
function buildRow(certs, certRowEl, statusRowEl) {
  certs.forEach(function(cert) {
    var certSel = document.createElement('select');
    certSel.disabled = true;
    var co = document.createElement('option');
    co.textContent = cert.label;
    certSel.appendChild(co);
    certRowEl.appendChild(certSel);

    var statusSel = document.createElement('select');
    statusSel.id = 'status-' + cert.id;
    [['none', '未取得'], ['cleared', 'クリア']].forEach(function(pair) {
      var o = document.createElement('option');
      o.value = pair[0];
      o.textContent = pair[1];
      statusSel.appendChild(o);
    });
    statusRowEl.appendChild(statusSel);
  });
  var pad = 6 - certs.length;
  for (var i = 0; i < pad; i++) {
    certRowEl.appendChild(document.createElement('div'));
    statusRowEl.appendChild(document.createElement('div'));
  }
}

buildRow(ROW1, document.getElementById('row-cert1'), document.getElementById('row-status1'));
buildRow(ROW2, document.getElementById('row-cert2'), document.getElementById('row-status2'));

// レベル順にソートする関数
function sortByLevel(certs) {
  return certs.slice().sort(function(a, b) {
    return LEVEL_ORDER[a.level] - LEVEL_ORDER[b.level];
  });
}

// バッジ数から各段の個数配列を返す（1段の最大は6個、上段が多めになるように分配）
var MAX_PER_ROW = 6;
function computeRowCounts(total) {
  if (total <= 0) return [];
  var rows = Math.ceil(total / MAX_PER_ROW);
  var base = Math.floor(total / rows);
  var extra = total % rows;
  var counts = [];
  for (var i = 0; i < rows; i++) {
    counts.push(base + (i < extra ? 1 : 0));
  }
  return counts;
}

// ハニカム配置の座標計算
// 画像600x600内のヘックス本体は506x584（左右47px、上下8pxの透明な「ふち」）
// 表示サイズに対する比率で、ふちのみが重なるよう step を算出する
function honeycombMetrics(badgeSize) {
  var stepX = badgeSize * 506 / 600;        // 同じ段の横方向ステップ（ヘックス幅）
  var stepY = badgeSize * 584 * 0.75 / 600; // 段間ステップ（ヘックス高 × 3/4）
  return { stepX: stepX, stepY: stepY };
}

// rowCounts に基づき、各バッジの相対座標とハニカム全体のサイズを返す
// 奇数段は半ステップ右にずらす（ハニカム配置）
function computeHoneycombLayout(rowCounts, badgeSize) {
  var m = honeycombMetrics(badgeSize);
  var minPos = Infinity, maxPos = -Infinity;
  rowCounts.forEach(function(count, rowIdx) {
    if (count <= 0) return;
    var start = (rowIdx % 2) * 0.5;
    var end = start + (count - 1);
    if (start < minPos) minPos = start;
    if (end > maxPos) maxPos = end;
  });
  if (!isFinite(minPos)) { minPos = 0; maxPos = 0; }

  var positions = [];
  rowCounts.forEach(function(count, rowIdx) {
    var rowOffsetUnits = (rowIdx % 2) * 0.5 - minPos;
    for (var i = 0; i < count; i++) {
      positions.push({
        x: (i + rowOffsetUnits) * m.stepX,
        y: rowIdx * m.stepY
      });
    }
  });

  return {
    positions: positions,
    width: (maxPos - minPos) * m.stepX + badgeSize,
    height: (rowCounts.length - 1) * m.stepY + badgeSize
  };
}

function generateBadges() {
  var cleared = ALL_CERTS.filter(function(c) {
    return document.getElementById('status-' + c.id).value === 'cleared';
  });

  if (cleared.length === 0) {
    alert('少なくとも1つの資格を「クリア」に設定してください。');
    return;
  }

  // レベル順にソート
  var sorted = sortByLevel(cleared);

  var container = document.getElementById('badgeContainer');
  container.innerHTML = '';

  var rowCounts = computeRowCounts(sorted.length);
  var BADGE_PX = 140;
  var layout = computeHoneycombLayout(rowCounts, BADGE_PX);

  var honeycomb = document.createElement('div');
  honeycomb.className = 'badge-honeycomb';
  honeycomb.style.width = layout.width + 'px';
  honeycomb.style.height = layout.height + 'px';

  layout.positions.forEach(function(pos, i) {
    var item = document.createElement('div');
    item.className = 'badge-item';
    item.style.left = pos.x + 'px';
    item.style.top = pos.y + 'px';
    var img = document.createElement('img');
    img.src = BADGE_DATA[sorted[i].id];
    img.alt = sorted[i].label;
    item.appendChild(img);
    honeycomb.appendChild(item);
  });

  container.appendChild(honeycomb);

  document.getElementById('resultTitle').style.display = 'block';
  container.style.display = 'block';
  document.getElementById('btnDownload').style.display = 'block';
}

function downloadImage() {
  var cleared = ALL_CERTS.filter(function(c) {
    return document.getElementById('status-' + c.id).value === 'cleared';
  });
  if (cleared.length === 0) return;

  var sorted = sortByLevel(cleared);
  var rowCounts = computeRowCounts(sorted.length);

  var badgeSize = 160;
  var layout = computeHoneycombLayout(rowCounts, badgeSize);
  var padX = 24;
  var padY = 24;
  var cw = layout.width + padX * 2;
  var ch = layout.height + padY * 2;

  var canvas = document.getElementById('downloadCanvas');
  var dpr = 2;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  var ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, cw, ch);

  var loaded = 0;
  var total = sorted.length;

  function drawAll() {
    layout.positions.forEach(function(pos, i) {
      ctx.drawImage(imageCache[sorted[i].id], padX + pos.x, padY + pos.y, badgeSize, badgeSize);
    });

    var a = document.createElement('a');
    var now = new Date();
    var d = now.getFullYear() +
      ('0' + (now.getMonth() + 1)).slice(-2) +
      ('0' + now.getDate()).slice(-2);
    a.download = 'aws-badges-' + d + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  sorted.forEach(function(cert) {
    var img = imageCache[cert.id];
    if (img.complete) {
      loaded++;
      if (loaded === total) drawAll();
    } else {
      img.onload = function() {
        loaded++;
        if (loaded === total) drawAll();
      };
    }
  });
}

document.getElementById('btnGenerate').addEventListener('click', generateBadges);
document.getElementById('btnDownload').addEventListener('click', downloadImage);
</script>
</body>
</html>
